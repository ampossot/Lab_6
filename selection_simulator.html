<body>

<h1>Selection Simulator</h1>

<button class="backButton" onclick="window.location.href='index.html'">
← Back to Main Menu
</button>

<button class="generateButton" onclick="generateSelectionSimulator()">Generate Starting Population</button>
<button onclick="exitApp()">Exit / Refresh</button>

<div class="credit">Dr. Andres Posso-Terranova. 2026. ©</div>

<div style="text-align:center; margin-top:15px;">
  <a href="https://www.buymeacoffee.com/ampossot" target="_blank" rel="noopener noreferrer">
    <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=ampossot&button_colour=FFDD00&font_colour=000000&font_family=Cookie&outline_colour=000000&coffee_colour=ffffff" />
  </a>
</div>


<div id="output"></div>
<div id="alleles"></div>
<div id="expected"></div>
<div id="check"></div>
<div id="results"></div>
<div class="card"><canvas id="chart"></canvas></div>
<div class="card"><canvas id="genotypeChart"></canvas></div>
<div id="finalCredit"></div>

<script>
let observed = [];
let expectedVals = [];
let genotypes = ["AA", "Aa", "aa"];
let pValueObserved = 0;
let qValueObserved = 0;
let total = 0;
let chart;
let genotypeChart;
let datasetLocked = false;

let beforeObserved = [];
let afterObserved = [];
let beforeP = 0;
let beforeQ = 0;
let afterP = 0;
let afterQ = 0;
let selectionApplied = false;
let selectedSelectionType = "";
let selectedGenotype = "";

function clearPrevious() {
  document.getElementById("output").innerHTML = "";
  document.getElementById("alleles").innerHTML = "";
  document.getElementById("expected").innerHTML = "";
  document.getElementById("check").innerHTML = "";
  document.getElementById("results").innerHTML = "";
  document.getElementById("finalCredit").innerHTML = "";
  selectionApplied = false;

  if (chart) {
    chart.destroy();
  }

  if (genotypeChart) {
    genotypeChart.destroy();
  }
}

function generateSelectionSimulator() {
  if (datasetLocked) {
    alert("Refresh Browser for New Dataset");
    return;
  }

  datasetLocked = true;
  clearPrevious();

  total = Math.floor(Math.random() * 301) + 300;

  let p = Math.random() * 0.5 + 0.25;
  let q = 1 - p;

  beforeP = p;
  beforeQ = q;

  let probs = [
    p * p,
    2 * p * q,
    q * q
  ];

  beforeObserved = sampleMultinomial(total, probs);
  observed = beforeObserved.slice();

  showSelectionStart();
}

function sampleMultinomial(n, probs) {
  let counts = [0, 0, 0];

  for (let i = 0; i < n; i++) {
    let r = Math.random();

    if (r < probs[0]) counts[0]++;
    else if (r < probs[0] + probs[1]) counts[1]++;
    else counts[2]++;
  }

  return counts;
}

function showSelectionStart() {
  let html = `
    <div class="card">
      <h2>Selection Simulator: Starting Population</h2>
      <p><b>Total individuals:</b> ${total}</p>
      <p>This starting population was generated under Hardy-Weinberg expectations.</p>

      <table>
        <tr>
          <th>Genotype</th>
          <th>Initial number</th>
        </tr>
  `;

  for (let i = 0; i < 3; i++) {
    html += `
      <tr>
        <td>${genotypes[i]}</td>
        <td>${beforeObserved[i]}</td>
      </tr>
    `;
  }

  html += `
      </table>

      <div class="warning">
        <b>Student task:</b> Select a type of selection and apply it to the starting population. Then compare allele frequencies before and after selection.
      </div>
    </div>

    <div class="card">
      <h2>Apply Selection</h2>

      <p><b>Selection type</b></p>
      <select id="selection_type">
        <option value="">Select one option</option>
        <option value="positive">Positive selection for one genotype</option>
        <option value="against">Selection against one genotype</option>
        <option value="balancing">Balancing selection / heterozygote advantage</option>
      </select>

      <p><b>Target genotype</b></p>
      <select id="selection_genotype">
        <option value="">Select one option</option>
        <option value="AA">AA</option>
        <option value="Aa">Aa</option>
        <option value="aa">aa</option>
      </select>

      <button onclick="applySelection()">Apply Selection</button>
    </div>
  `;

  document.getElementById("output").innerHTML = html;
}

function applySelection() {

  if (selectionApplied) {
    alert("Selection has already been applied. Refresh Browser for New Dataset");
    return;
  }

  let selectionType = document.getElementById("selection_type").value;
  let genotypeTarget = document.getElementById("selection_genotype").value;

  if (!selectionType) {
    alert("Please select a type of selection.");
    return;
  }

  if (selectionType !== "balancing" && !genotypeTarget) {
    alert("Please select the target genotype.");
    return;
  }

  selectedSelectionType = selectionType;
  selectedGenotype = genotypeTarget;

  let wAA = 1.0;
  let wAa = 1.0;
  let waa = 1.0;

  if (selectionType === "positive") {
    wAA = genotypeTarget === "AA" ? 1.8 : 0.45;
    wAa = genotypeTarget === "Aa" ? 1.8 : 0.45;
    waa = genotypeTarget === "aa" ? 1.8 : 0.45;
  }

  if (selectionType === "against") {
    wAA = genotypeTarget === "AA" ? 0.15 : 1.0;
    wAa = genotypeTarget === "Aa" ? 0.15 : 1.0;
    waa = genotypeTarget === "aa" ? 0.15 : 1.0;
  }

  if (selectionType === "balancing") {
    wAA = 0.35;
    wAa = 2.0;
    waa = 0.35;
    selectedGenotype = "Aa";
  }

  let fAA = beforeObserved[0] / total;
  let fAa = beforeObserved[1] / total;
  let faa = beforeObserved[2] / total;

  let meanFitness = (fAA * wAA) + (fAa * wAa) + (faa * waa);

  let probs = [
    (fAA * wAA) / meanFitness,
    (fAa * wAa) / meanFitness,
    (faa * waa) / meanFitness
  ];

  afterObserved = sampleMultinomial(total, probs);
  observed = afterObserved.slice();

  beforeP = ((2 * beforeObserved[0]) + beforeObserved[1]) / (2 * total);
  beforeQ = ((2 * beforeObserved[2]) + beforeObserved[1]) / (2 * total);

  afterP = ((2 * afterObserved[0]) + afterObserved[1]) / (2 * total);
  afterQ = ((2 * afterObserved[2]) + afterObserved[1]) / (2 * total);

  selectionApplied = true;

  document.getElementById("selection_type").disabled = true;
  document.getElementById("selection_genotype").disabled = true;

  showSelectionAfter();
}

function showSelectionAfter() {
  let selectionDescription = "";

  if (selectedSelectionType === "positive") {
    selectionDescription = `Positive selection for ${selectedGenotype}`;
  } else if (selectedSelectionType === "against") {
    selectionDescription = `Selection against ${selectedGenotype}`;
  } else {
    selectionDescription = "Balancing selection / heterozygote advantage";
  }

  let html = `
    <div class="card">
      <h2>Selection Simulator: Results After One Generation</h2>
      <p><b>Selection applied:</b> ${selectionDescription}</p>
      <p><b>Total individuals:</b> ${total}</p>

      <table>
        <tr>
          <th>Genotype</th>
          <th>Before selection</th>
          <th>After selection</th>
        </tr>
  `;

  for (let i = 0; i < 3; i++) {
    html += `
      <tr>
        <td>${genotypes[i]}</td>
        <td>${beforeObserved[i]}</td>
        <td>${afterObserved[i]}</td>
      </tr>
    `;
  }

  html += `
      </table>

      <div class="warning">
        <b>Student task:</b> Calculate p and q after selection, calculate expected Hardy-Weinberg numbers for the new population, run a χ² test, and interpret how selection changed allele frequencies.
      </div>
    </div>
  `;

  document.getElementById("output").innerHTML += html;

  createAlleleInputs();
}

function createAlleleInputs() {
  let html = `
    <div class="card">
      <h2>Step 1: Calculate Allele Frequencies After Selection</h2>
      <p>Use the observed genotype counts after selection to calculate p and q.</p>

      <p><b>p = frequency of allele A</b></p>
      <input type="number" step="0.0001" id="student_p" placeholder="Enter p">

      <p><b>q = frequency of allele a</b></p>
      <input type="number" step="0.0001" id="student_q" placeholder="Enter q">

      <button onclick="checkAlleles()">Check p and q</button>
    </div>
  `;

  document.getElementById("alleles").innerHTML = html;
}

function checkAlleles() {
  pValueObserved = afterP;
  qValueObserved = afterQ;

  let pInput = document.getElementById("student_p");
  let qInput = document.getElementById("student_q");

  let studentP = parseFloat(pInput.value);
  let studentQ = parseFloat(qInput.value);

  pInput.style.backgroundColor = "white";
  qInput.style.backgroundColor = "white";

  let allCorrect = true;
  let tolerance = 0.01;

  if (isNaN(studentP) || Math.abs(studentP - pValueObserved) > tolerance) {
    allCorrect = false;
    pInput.style.backgroundColor = "#ffd6d6";
  }

  if (isNaN(studentQ) || Math.abs(studentQ - qValueObserved) > tolerance) {
    allCorrect = false;
    qInput.style.backgroundColor = "#ffd6d6";
  }

  if (!allCorrect) {
    document.getElementById("check").innerHTML = `
      <div class="card" style="background:#ffe5e5;">
        <h2>⚠️ Check Your Allele Frequencies</h2>
        <p>Some allele frequency values are not correct yet.</p>
        <p>Incorrect fields are highlighted in red.</p>
        <p>Values within 0.01 of the correct allele frequency are accepted.</p>
      </div>
    `;
    return;
  }

  document.getElementById("check").innerHTML = `
    <div class="card" style="background:#e6ffe6;">
      <h2>✅ Allele Frequencies Correct</h2>
      <p>You may now proceed to calculate the expected Hardy-Weinberg numbers.</p>
    </div>
  `;

  createExpectedInputs();
}

function createExpectedInputs() {
  let html = `
    <div class="card">
      <h2>Step 2: Enter Expected Numbers Under Hardy-Weinberg Equilibrium</h2>

      <p>Expected genotype frequencies for the population after selection:</p>
      <p><b>AA = p²</b></p>
      <p><b>Aa = 2pq</b></p>
      <p><b>aa = q²</b></p>
  `;

  for (let i = 0; i < 3; i++) {
    html += `
      <p>${genotypes[i]}</p>
      <input type="number" id="e${i}" placeholder="Expected number">
    `;
  }

  html += `
      <button onclick="checkExpected()">Check Expected</button>
    </div>
  `;

  document.getElementById("expected").innerHTML = html;
}

function checkExpected() {
  let correctExpected = [
    total * pValueObserved * pValueObserved,
    total * 2 * pValueObserved * qValueObserved,
    total * qValueObserved * qValueObserved
  ];

  let allCorrect = true;

  for (let i = 0; i < 3; i++) {
    let input = document.getElementById("e" + i);
    let student = parseFloat(input.value);

    input.style.backgroundColor = "white";

    if (isNaN(student)) {
      allCorrect = false;
      input.style.backgroundColor = "#ffd6d6";
      continue;
    }

    let exact = correctExpected[i];
    let rounded = Math.round(exact);
    let tolerance = exact * 0.01;

    if (
      student !== rounded &&
      Math.abs(student - exact) > tolerance
    ) {
      allCorrect = false;
      input.style.backgroundColor = "#ffd6d6";
    }
  }

  if (!allCorrect) {
    document.getElementById("check").innerHTML = `
      <div class="card" style="background:#ffe5e5;">
        <h2>⚠️ Check Your Expected Values</h2>
        <p>Some expected values are not correct yet.</p>
        <p>Incorrect fields are highlighted in red.</p>
        <p>Whole numbers or values within 1% of the correct expected value are accepted.</p>
      </div>
    `;
    return;
  }

  document.getElementById("check").innerHTML = `
    <div class="card" style="background:#e6ffe6;">
      <h2>✅ Expected Values Correct</h2>
      <p>You may now proceed to the χ² test.</p>

      <button onclick="runTest()">Run χ² Test</button>
    </div>
  `;
}

function runTest() {
  expectedVals = [];

  for (let i = 0; i < 3; i++) {
    let v = parseFloat(document.getElementById("e" + i).value);

    if (isNaN(v) || v <= 0) {
      alert("Please enter valid positive expected numbers.");
      return;
    }

    expectedVals.push(v);
  }

  let chi = 0;

  let table = `
    <div class="card">
      <h2>χ² Results</h2>

      <table>
        <tr>
          <th>Genotype</th>
          <th>Observed after selection</th>
          <th>Expected under HW</th>
          <th>(O - E)² / E</th>
        </tr>
  `;

  for (let i = 0; i < 3; i++) {
    let component = Math.pow(observed[i] - expectedVals[i], 2) / expectedVals[i];
    chi += component;

    table += `
      <tr>
        <td>${genotypes[i]}</td>
        <td>${observed[i]}</td>
        <td>${expectedVals[i]}</td>
        <td>${component.toFixed(4)}</td>
      </tr>
    `;
  }

  let p = chiSquareP_df1(chi);

  let conclusion = p < 0.05
    ? "Reject H₀. The observed genotype counts after selection do not fit Hardy-Weinberg expectations."
    : "Fail to reject H₀. The observed genotype counts after selection fit Hardy-Weinberg expectations.";

  table += `
      </table>

      <h2>Allele Frequency Change</h2>
      <table>
        <tr>
          <th>Allele</th>
          <th>Before selection</th>
          <th>After selection</th>
        </tr>
        <tr>
          <td>A (p)</td>
          <td>${beforeP.toFixed(4)}</td>
          <td>${afterP.toFixed(4)}</td>
        </tr>
        <tr>
          <td>a (q)</td>
          <td>${beforeQ.toFixed(4)}</td>
          <td>${afterQ.toFixed(4)}</td>
        </tr>
      </table>

      <p><b>χ² value:</b> ${chi.toFixed(4)}</p>
      <p><b>Degrees of freedom:</b> 1</p>
      <p><b>p-value:</b> ${p.toFixed(6)}</p>

      <p><b>H₀:</b> The population after selection is in Hardy-Weinberg equilibrium for this locus.</p>
      <p><b>Conclusion:</b> ${conclusion}</p>
    </div>
  `;

  document.getElementById("results").innerHTML = table;

  drawSelectionAlleleChart();

  document.getElementById("finalCredit").innerHTML = `
  <div class="credit">
    Dr. Andres Posso-Terranova. 2026. ©
  </div>
  <button class="exportButton" onclick="exportPDF()">Export Report as PDF</button>
  <button onclick="exitApp()">Exit</button>


<div style="text-align:center; margin-top:15px;">
  <a href="https://www.buymeacoffee.com/ampossot" target="_blank" rel="noopener noreferrer">
    <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=ampossot&button_colour=FFDD00&font_colour=000000&font_family=Cookie&outline_colour=000000&coffee_colour=ffffff" />
  </a>
</div>

`;
}

function drawSelectionAlleleChart() {
  const ctx = document.getElementById("chart");

  if (chart) {
    chart.destroy();
  }

  if (genotypeChart) {
    genotypeChart.destroy();
  }

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Allele A (p)", "Allele a (q)"],
      datasets: [
        {
          label: "Before selection",
          data: [beforeP, beforeQ],
          backgroundColor: "rgba(54, 162, 235, 0.6)"
        },
        {
          label: "After selection",
          data: [afterP, afterQ],
          backgroundColor: "rgba(255, 159, 64, 0.6)"
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        title: {
          display: true,
          text: "Allele Frequency Change After One Generation of Selection",
          font: {
            size: 28
          }
        },
        legend: {
          labels: {
            font: {
              size: 20
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            font: {
              size: 20
            }
          }
        },
        y: {
          beginAtZero: true,
          max: 1,
          ticks: {
            font: {
              size: 18
            }
          }
        }
      }
    }
  });

  createVisibleGenotypeChart();
}


function createVisibleGenotypeChart() {
  const genotypeCtx = document.getElementById("genotypeChart");

  if (genotypeChart) {
    genotypeChart.destroy();
  }

  genotypeChart = new Chart(genotypeCtx, {
    type: "bar",
    data: {
      labels: genotypes,
      datasets: [
        {
          label: "Before selection",
          data: beforeObserved,
          backgroundColor: "rgba(54, 162, 235, 0.6)"
        },
        {
          label: "After selection",
          data: afterObserved,
          backgroundColor: "rgba(255, 159, 64, 0.6)"
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        title: {
          display: true,
          text: "Genotype Counts Before and After Selection",
          font: {
            size: 28
          }
        },
        legend: {
          labels: {
            font: {
              size: 20
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            font: {
              size: 20
            }
          }
        },
        y: {
          beginAtZero: true,
          ticks: {
            font: {
              size: 18
            }
          }
        }
      }
    }
  });
}

function exportPDF() {
  let studentName = prompt("Enter Student Name:");
  if (!studentName) {
    alert("Student Name is required.");
    return;
  }

  let nsid = prompt("Enter NSID:");
  if (!nsid) {
    alert("NSID is required.");
    return;
  }

  const now = new Date();

  const timestamp = now.toLocaleString("en-CA", {
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  const chartImage = document.getElementById("chart").toDataURL("image/png");
  const genotypeChartImage = createGenotypeCountChartImage();

  let report = document.createElement("div");
  report.style.background = "white";
  report.style.padding = "45px";
  report.style.fontFamily = "Arial";
  report.style.width = "900px";
  report.style.position = "absolute";
  report.style.left = "-9999px";
  report.style.top = "0";

  report.innerHTML = `
    <div style="line-height:1.5;">

    <h1 style="text-align:center; margin-bottom:25px;">Selection Simulator</h1>

    <p><b>Student Name:</b> ${studentName}</p>
    <p><b>NSID:</b> ${nsid}</p>
    <p><b>Total individuals:</b> ${total}</p>
    <p><b>Timestamp:</b> ${timestamp}</p>

    <hr style="margin-top:20px; margin-bottom:20px;">

    ${document.getElementById("output").innerHTML}
    ${document.getElementById("check").innerHTML}
    ${document.getElementById("results").innerHTML}

    <div class="card">
      <h2>Allele Frequency Graph</h2>
      <img src="${chartImage}" style="width:100%;">
    </div>

    <div class="card">
      <h2>Genotype Count Graph</h2>
      <img src="${genotypeChartImage}" style="width:100%;">
    </div>

    <div style="text-align:center; font-size:15px; margin-top:25px; color:#555;">
      Dr. Andres Posso-Terranova. 2026. ©
    </div>

    <div style="height:80px;"></div>

    </div>
  `;

  document.body.appendChild(report);

  html2canvas(report, { scale: 1 }).then(canvas => {
    const { jsPDF } = window.jspdf;

    let pdf = new jsPDF("p", "mm", "a4");
    let pageWidth = pdf.internal.pageSize.getWidth();
    let pageHeight = pdf.internal.pageSize.getHeight();

    let marginLeft = 15;
    let marginTop = 15;
    let marginBottom = 35;

    let imgWidth = pageWidth - 30;
    let usablePageHeight = pageHeight - marginTop - marginBottom;

    let pageCanvasHeight = Math.floor(canvas.width * usablePageHeight / imgWidth);
    let sourceY = 0;
    let pageNumber = 0;

    while (sourceY < canvas.height) {
      let sliceHeight = Math.min(pageCanvasHeight, canvas.height - sourceY);

      let pageCanvas = document.createElement("canvas");
      pageCanvas.width = canvas.width;
      pageCanvas.height = sliceHeight;

      let pageContext = pageCanvas.getContext("2d");
      pageContext.drawImage(
        canvas,
        0,
        sourceY,
        canvas.width,
        sliceHeight,
        0,
        0,
        canvas.width,
        sliceHeight
      );

      let pageImgData = pageCanvas.toDataURL("image/jpeg", 0.72);
      let pageImgHeight = sliceHeight * imgWidth / canvas.width;

      if (pageNumber > 0) {
        pdf.addPage();
      }

      pdf.addImage(pageImgData, "JPEG", marginLeft, marginTop, imgWidth, pageImgHeight);

      sourceY += pageCanvasHeight;
      pageNumber++;
    }

    let cleanName = studentName.replace(/\s+/g, "_");
    pdf.save(`${cleanName}_${nsid}_Selection_Simulator_Report.pdf`);

    document.body.removeChild(report);
  });
}

/* Chi-square p-value for df = 1 */
function chiSquareP_df1(x) {
  return erfc(Math.sqrt(x / 2));
}

function erfc(x) {
  let z = Math.abs(x);
  let t = 1 / (1 + z / 2);

  let r = t * Math.exp(
    -z * z - 1.26551223 +
    t * (1.00002368 +
    t * (0.37409196 +
    t * (0.09678418 +
    t * (-0.18628806 +
    t * (0.27886807 +
    t * (-1.13520398 +
    t * (1.48851587 +
    t * (-0.82215223 +
    t * 0.17087277))))))))
  );

  return x >= 0 ? r : 2 - r;
}

  }
