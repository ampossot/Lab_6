<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Population Genetics Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f7f7f7;
}

h1 {
  font-size: 34px;
  text-align: center;
}

button {
  font-size: 22px;
  padding: 15px;
  margin-top: 10px;
  width: 100%;
  border-radius: 10px;
  border: none;
  background: #2f6fed;
  color: white;
  cursor: pointer;

  transition:
    transform 0.2s ease,
    background 0.2s ease,
    box-shadow 0.2s ease;
}

button:hover {
  background: #1f5ad1;

  transform: scale(1.03);

  box-shadow: 0 8px 18px rgba(47,111,237,0.35);
}

button:active {
  transform: scale(0.98);
}

.generateButton {
  font-size: 26px;
  padding: 25px;
}

.exportButton {
  background: #198754;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  font-size: 18px;
}

.credit {
  text-align: center;
  font-size: 15px;
  margin-top: 20px;
  color: #555;
}

.warning {
  background: #fff3cd;
  padding: 12px;
  border-radius: 8px;
  margin-top: 10px;
}

.backButton {
  width: auto;
  font-size: 16px;
  padding: 10px 18px;
  background: #6c757d;
  margin-bottom: 15px;
}

.backButton:hover {
  background: #5a6268;
}
</style>
</head>

<body>

<h1>Population Genetics Simulator</h1>

<button class="backButton" onclick="window.location.href='index.html'">
← Back to Main Menu
</button>

<button class="generateButton" onclick="window.location.href='pop_hw.html'">Generate Population in Hardy-Weinberg Equilibrium</button>
<button class="generateButton" onclick="window.location.href='pop_non_hw.html'">Generate Population NOT in Hardy-Weinberg Equilibrium</button>
<button class="generateButton" onclick="window.location.href='pop_random.html'">Generate a Random Population</button>

<button class="generateButton" onclick="goToSelectionSimulator()">
Selection Simulator
</button>

<button class="generateButton" onclick="goToSelectionAcrossGenerations()">
Selection Across Generations
</button>

<button class="generateButton" onclick="goToGeneticDriftSimulator()">
Genetic Drift Simulator
</button>

<button onclick="exitApp()">Exit / Refresh</button>

<div class="credit">Dr. Andres Posso-Terranova. 2026. ©</div>

<div style="text-align:center; margin-top:15px;">
  <a href="https://www.buymeacoffee.com/ampossot" target="_blank" rel="noopener noreferrer">
    <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=ampossot&button_colour=FFDD00&font_colour=000000&font_family=Cookie&outline_colour=000000&coffee_colour=ffffff" />
  </a>
</div>

<script>
let datasetLocked = false;

function goToSelectionSimulator() {
  if (datasetLocked) {
    alert("Refresh Browser for New Dataset");
    return;
  }

  window.location.href = "selection_simulator.html";
}

function goToSelectionAcrossGenerations() {
  if (datasetLocked) {
    alert("Refresh Browser for New Dataset");
    return;
  }

  window.location.href = "sel_generations.html";
}

function goToGeneticDriftSimulator() {
  if (datasetLocked) {
    alert("Refresh Browser for New Dataset");
    return;
  }

  window.location.href = "genetic_drift_simulator.html";
}

function exitApp() {
  if (confirm("Are you sure you want to exit?")) {
    location.reload();
  }
}
</script>

</body>
</html>
