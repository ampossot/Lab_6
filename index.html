<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Genetics Virtual Lab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(47,111,237,0.22), transparent 30%),
    linear-gradient(180deg, #07152f 0%, #0b1020 45%, #f4f7fb 45%, #f7f7f7 100%);
  color: #0b1020;
}

.page {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 16px;
}

.hero {
  width: 100%;
  display: block;
  border-radius: 22px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.25);
}

.lab-panel {
  margin-top: 18px;
  background: rgba(255,255,255,0.96);
  border-radius: 24px;
  padding: 22px;
  box-shadow: 0 18px 35px rgba(9,20,45,0.18);
  border: 1px solid rgba(47,111,237,0.12);
}

.tool-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

button {
  min-height: 120px;
  width: 100%;
  border: none;
  border-radius: 22px;
  cursor: pointer;
  padding: 22px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.2px;
  background: white;
  color: #14213d;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  transition:
    transform 0.18s ease,
    box-shadow 0.18s ease,
    filter 0.18s ease;
  display: flex;
  align-items: center;
  text-align: left;
  gap: 18px;
  position: relative;
  overflow: hidden;
}

button:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 35px rgba(0,0,0,0.18);
}

button:active {
  transform: scale(0.98);
}

.tool-icon {
  width: 76px;
  height: 76px;
  min-width: 76px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  color: white;
  box-shadow:
    inset 0 2px 10px rgba(255,255,255,0.22),
    0 4px 10px rgba(0,0,0,0.15);
}

.tool-title {
  display: block;
  font-size: 17px;
  line-height: 1.3;
  font-weight: 700;
}

.downloads {
  background: white;
  color: #2563eb;
}

.mapping {
  background: white;
  color: #6d28d9;
}

.stats {
  background: white;
  color: #15803d;
}

.population {
  background: white;
  color: #d97706;
}

.exitButton {
  background: white;
  color: #14213d;
}

.downloads .tool-icon {
  background: linear-gradient(135deg,#3b82f6,#2563eb);
}

button:not(.downloads):not(.stats):not(.mapping):not(.population):not(.exitButton):nth-of-type(2) .tool-icon {
  background: linear-gradient(135deg,#8b5cf6,#6d28d9);
}

button:not(.downloads):not(.stats):not(.mapping):not(.population):not(.exitButton):nth-of-type(3) .tool-icon {
  background: linear-gradient(135deg,#06b6d4,#0284c7);
}

button:not(.downloads):not(.stats):not(.mapping):not(.population):not(.exitButton):nth-of-type(4) .tool-icon {
  background: linear-gradient(135deg,#f43f5e,#e11d48);
}

.stats .tool-icon {
  background: linear-gradient(135deg,#22c55e,#15803d);
}

.mapping .tool-icon {
  background: linear-gradient(135deg,#7c3aed,#6d28d9);
}

.population .tool-icon {
  background: linear-gradient(135deg,#f59e0b,#d97706);
}

.exitButton .tool-icon {
  background: linear-gradient(135deg,#1e3a8a,#0f172a);
}

button::after {
  content: "";
  position: absolute;
  left: 114px;
  right: 28px;
  bottom: 24px;
  height: 2px;
  opacity: 0.28;
  background: currentColor;
}

.credit {
  text-align: center;
  font-size: 15px;
  margin-top: 20px;
  color: #263244;
  font-weight: 700;
}

.coffee {
  text-align: center;
  margin-top: 15px;
}

.coffee img {
  max-width: 230px;
  width: 90%;
}

@media (max-width: 900px) {
  .tool-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  button {
    min-height: 88px;
    font-size: 17px;
  }
}

@media (max-width: 600px) {
  .page {
    padding: 10px;
  }

  .hero {
    border-radius: 16px;
  }

  .lab-panel {
    margin-top: 12px;
    border-radius: 18px;
    padding: 12px;
  }

  .tool-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  button {
    min-height: 92px;
    font-size: 16px;
    padding: 14px;
    border-radius: 16px;
    gap: 12px;
  }

  .tool-icon {
    font-size: 28px;
    margin-bottom: 5px;
  }

  .credit {
    font-size: 14px;
  }
}

.sigma-symbol {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 46px;
  font-weight: 900;
  line-height: 1;
}

.drosophila-icon svg {
  width: 58px;
  height: 58px;
  display: block;
}

.fly-wing {
  fill: rgba(255,255,255,0.72);
  stroke: white;
  stroke-width: 1.7;
}

.fly-body {
  fill: white;
}

.fly-head {
  fill: white;
}

.fly-eye {
  fill: #ff2f2f;
}

.fly-detail {
  stroke: #7c3aed;
  stroke-width: 1.4;
  stroke-linecap: round;
  opacity: 0.55;
}

.fly-leg {
  stroke: white;
  stroke-width: 2.8;
  stroke-linecap: round;
  fill: none;
}

</style>
</head>

<body>

<div class="page">

  <img class="hero" src="genetics_virtual_lab_banner.jpeg" alt="Genetics Virtual Lab banner">

  <div class="lab-panel">
    <div class="tool-grid">

      <button class="downloads" onclick="window.location.href='downloads.html'">
        <span class="tool-icon"><i class="fa-solid fa-folder-open"></i></span>
        <span class="tool-title">Downloads</span>
      </button>

      <button onclick="window.location.href='monohybrid_inheritance_analyzer.html'">
        <span class="tool-icon"><i class="fa-solid fa-seedling"></i></span>
        <span class="tool-title">Monohybrid Inheritance Analyzer</span>
      </button>

      <button onclick="window.location.href='dihybrid_inheritance_analyzer.html'">
        <span class="tool-icon"><i class="fa-solid fa-table-cells-large"></i></span>
        <span class="tool-title">Dihybrid Inheritance Analyzer</span>
      </button>

      <button onclick="window.location.href='sex_linked_inheritance_analyzer.html'">
        <span class="tool-icon"><i class="fa-solid fa-venus-mars"></i></span>
        <span class="tool-title">Sex-Linked Inheritance Analyzer</span>
      </button>

      <button class="stats" onclick="window.location.href='dihybrid_x2.html'">
        <span class="tool-icon"><i class="fa-solid fa-chart-column"></i></span>
        <span class="tool-title">Dihybrid Cross and X<sup>2</sup> Test</span>
      </button>

      <button class="stats" onclick="window.location.href='test_cross_x2.html'">
        <span class="tool-icon"><span class="sigma-symbol">Σ</span></span>
        <span class="tool-title">Test-Cross and X<sup>2</sup> Test</span>
      </button>

      <button class="mapping" onclick="window.location.href='three_point_mapping_drosophila.html'">
        <span class="tool-icon drosophila-icon">
          <svg viewBox="0 0 80 80" aria-hidden="true">
            <ellipse class="fly-wing" cx="25" cy="28" rx="12" ry="22" transform="rotate(-35 25 28)"/>
            <ellipse class="fly-wing" cx="55" cy="28" rx="12" ry="22" transform="rotate(35 55 28)"/>
            <ellipse class="fly-body" cx="40" cy="44" rx="9" ry="20"/>
            <circle class="fly-head" cx="40" cy="24" r="10"/>
            <circle class="fly-eye" cx="34" cy="22" r="4.2"/>
            <circle class="fly-eye" cx="46" cy="22" r="4.2"/>
            <path class="fly-detail" d="M40 31 L40 60"/>
            <path class="fly-detail" d="M34 38 Q40 42 46 38"/>
            <path class="fly-detail" d="M33 48 Q40 52 47 48"/>
            <path class="fly-leg" d="M33 49 L20 57"/>
            <path class="fly-leg" d="M47 49 L60 57"/>
            <path class="fly-leg" d="M34 57 L26 69"/>
            <path class="fly-leg" d="M46 57 L54 69"/>
            <path class="fly-leg" d="M33 20 L22 10"/>
            <path class="fly-leg" d="M47 20 L58 10"/>
          </svg>
        </span>
        <span class="tool-title">Three-point Mapping in <i>Drosophila</i></span>
      </button>

      <button class="mapping" onclick="window.location.href='three_point_linkage_mapping.html'">
        <span class="tool-icon"><i class="fa-solid fa-location-dot"></i></span>
        <span class="tool-title">Three-Point Mapping Exercise</span>
      </button>

      <button class="mapping" onclick="window.location.href='gwas_generator.html'">
        <span class="tool-icon"><i class="fa-solid fa-chart-line"></i></span>
        <span class="tool-title">GWAS - Mapping Generator</span>
      </button>

      <button class="population" onclick="window.location.href='pop_gen.html'">
        <span class="tool-icon"><i class="fa-solid fa-users"></i></span>
        <span class="tool-title">Population Genetics Generator</span>
      </button>

      <button class="exitButton" onclick="exitApp()">
        <span class="tool-icon"><i class="fa-solid fa-rotate-right"></i></span>
        <span class="tool-title">Exit / Refresh</span>
      </button>

    </div>

    <div class="credit">Dr. Andres Posso-Terranova. 2026. ©</div>

    <div class="coffee">
      <a href="https://www.buymeacoffee.com/ampossot" target="_blank" rel="noopener noreferrer">
        <img src="https://img.buymeacoffee.com/button-api/?text=Buy me a coffee&emoji=&slug=ampossot&button_colour=FFDD00&font_colour=000000&font_family=Cookie&outline_colour=000000&coffee_colour=ffffff" />
      </a>
    </div>
  </div>

</div>

<script>
function exitApp() {
  if (confirm("Are you sure you want to exit?")) {
    location.reload();
  }
}
</script>

</body>
</html>
